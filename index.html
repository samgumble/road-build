<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Task 29 (mobile): no user pinch-zoom of the page itself (the canvas has its own pinch-to-dolly
       gesture) and viewport-fit=cover so env(safe-area-inset-*) resolves on notched iOS devices. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Groundwork</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #1d1f21;
                 overscroll-behavior: none; touch-action: none; }
    #app { display: block; width: 100%; height: 100%; touch-action: none; overscroll-behavior: none; }
    #hud { position: fixed; inset: 0; pointer-events: none;
           font-family: ui-monospace, 'SF Mono', Menlo, monospace; color: #d8d5cd; }
    #nogl { display: none; position: fixed; inset: 0; place-items: center;
            color: #d8d5cd; font-family: ui-monospace, Menlo, monospace; }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <div id="hud"></div>
  <div id="nogl"><p>GROUNDWORK needs WebGL, which this browser doesn't support.</p></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
